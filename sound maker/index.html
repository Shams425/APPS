<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sound maker</title>

    <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/main.css" />
  </head>
  <body>
    <header>
      <nav class="text-center text-light bg-dark p-3">
        <h2>Sound Maker</h2>
      </nav>
    </header>
    <div class="showAnimation"></div>
    <section id="sounds-btn" class="mb-2">
      <div class="beats container-fluid d-flex px-2 justify-content-center">
        <div class="beat1 btn btn-dark">
          <audio src="assets/sounds/bubbles.mp3"></audio>
        </div>
        <div class="beat2 btn btn-info">
          <audio src="assets/sounds/clay.mp3"></audio>
        </div>
        <div class="beat3 btn btn-primary">
          <audio src="assets/sounds/confetti.mp3"></audio>
        </div>
        <div class="beat4 btn btn-secondary">
          <audio src="assets/sounds/glimmer.mp3"></audio>
        </div>
        <div class="beat5 btn btn-success">
          <audio src="assets/sounds/moon.mp3"></audio>
        </div>
        <div class="beat6 btn btn-warning">
          <audio src="assets/sounds/ufo.mp3"></audio>
        </div>
      </div>
    </section>
    <script src="assets/js/bootstrap.min.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
